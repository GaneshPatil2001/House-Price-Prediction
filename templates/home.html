<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>California Housing Predictor</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --glass-bg: rgba(255, 255, 255, 0.95);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1e293b;
            padding: 20px 0;
        }

        .container {
            max-width: 850px;
        }

        .card {
            background: var(--glass-bg);
            border: none;
            border-radius: 24px;
            backdrop-filter: blur(12px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        .card-header {
            background: var(--primary-gradient);
            padding: 40px 20px;
            text-align: center;
            border: none;
        }

        .card-header h2 {
            color: white;
            font-weight: 600;
            margin: 0;
            font-size: 1.8rem;
        }

        .card-header p {
            color: rgba(255, 255, 255, 0.8);
            margin: 10px 0 0;
            font-size: 0.95rem;
        }

        .card-body {
            padding: 40px;
        }

        .form-label {
            font-weight: 600;
            font-size: 0.85rem;
            color: #475569;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-control {
            border-radius: 12px;
            padding: 12px 15px;
            border: 2px solid #e2e8f0;
            transition: all 0.2s ease-in-out;
        }

        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15);
            outline: none;
        }

        .btn-predict {
            background: var(--primary-gradient);
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-weight: 600;
            color: white;
            width: 100%;
            margin-top: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(118, 75, 162, 0.4);
        }

        .btn-predict:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(118, 75, 162, 0.4);
            filter: brightness(1.1);
        }

        .prediction-box {
            margin-top: 30px;
            padding: 25px;
            border-radius: 16px;
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="card-header">
            <h2><i class="fas fa-house-chimney-window me-2"></i>California Housing AI</h2>
            <p>Predict real estate values using geographic and socio-economic data</p>
        </div>
        
        <div class="card-body">
            <form action="/predict" method="post" id="predictionForm">
                <div class="row g-4">
                    <div class="col-md-6">
                        <label class="form-label"><i class="fas fa-wallet text-primary"></i> Median Income</label>
                        <input type="number" step="any" name="MedInc" class="form-control" placeholder="In $10,000s (e.g. 8.3)" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label"><i class="fas fa-calendar-alt text-primary"></i> House Age</label>
                        <input type="number" step="any" name="HouseAge" class="form-control" placeholder="Median age in block" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label"><i class="fas fa-door-open text-primary"></i> Avg Rooms</label>
                        <input type="number" step="any" name="AveRooms" class="form-control" placeholder="Avg per household" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label"><i class="fas fa-bed text-primary"></i> Avg Bedrooms</label>
                        <input type="number" step="any" name="AveBedrms" class="form-control" placeholder="Avg per household" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label"><i class="fas fa-users text-primary"></i> Population</label>
                        <input type="number" step="any" name="Population" class="form-control" placeholder="Block population" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label"><i class="fas fa-chart-pie text-primary"></i> Avg Occupancy</label>
                        <input type="number" step="any" name="AveOccup" class="form-control" placeholder="Members per household" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label"><i class="fas fa-map-location-dot text-danger"></i> Latitude</label>
                        <input type="number" step="any" name="Latitude" class="form-control" placeholder="e.g. 34.05" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label"><i class="fas fa-map-pin text-danger"></i> Longitude</label>
                        <input type="number" step="any" name="Longitude" class="form-control" placeholder="e.g. -118.24" required>
                    </div>
                </div>

                <div class="mt-4">
                    <button type="submit" class="btn btn-predict" id="submitBtn">
                        <span id="btnText">Calculate Market Value</span>
                        <span id="loader" class="spinner-border spinner-border-sm d-none ms-2" role="status"></span>
                    </button>
                </div>
            </form>

            {% if prediction_text %}
            <div class="prediction-box text-center">
                <small class="text-uppercase text-muted fw-bold" style="letter-spacing: 1px;">Analysis Result</small>
                <h3 class="text-success mb-0 mt-2 fw-bold">
                    <i class="fas fa-circle-check me-2"></i>{{ prediction_text }}
                </h3>
            </div>
            {% endif %}
        </div>
    </div>
    
    <div class="text-center mt-4">
        <p class="text-white-50 mb-0"><small>© 2026 Housing Analytics Pro</small></p>
        <p class="text-white-50"><small>Precise Estimations via Scikit-Learn Models</small></p>
    </div>
</div>

<script>
    const form = document.getElementById('predictionForm');
    const btn = document.getElementById('submitBtn');
    const loader = document.getElementById('loader');
    const btnText = document.getElementById('btnText');

    form.onsubmit = function() {
        btnText.innerText = "Analyzing Market Data...";
        loader.classList.remove('d-none');
        btn.style.opacity = "0.8";
        btn.style.pointerEvents = "none";
    };
</script>

</body>
</html>
